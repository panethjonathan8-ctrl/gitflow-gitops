# Pre-commit hooks — run the same checks as CI locally before every commit.
#
# Setup (one time):
#   pip install pre-commit
#   pre-commit install
#
# Run manually against all files:
#   pre-commit run --all-files

repos:
  # ── Standard hygiene ─────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^k8s/helm/.*/templates/
      - id: check-merge-conflict
      - id: detect-private-key

  # ── Secret scan ──────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: no-aws-secrets
        name: Detect AWS credentials and secrets
        language: pygrep
        entry: '(?i)(AKIA[0-9A-Z]{16}|aws_secret_access_key\s*=|private_key\s*=\s*")'
        types: [text]
        exclude: \.pre-commit-config\.yaml

  # ── Terraform — mirrors terraform-plan.yml fmt check ─────────────────────────
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.107.0
    hooks:
      - id: terraform_fmt

  # ── Shell scripts — mirrors shell-lint.yml ────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
