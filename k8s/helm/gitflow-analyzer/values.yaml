# ── Shared image settings ─────────────────────────────────────────────────────
image:
  tag: latest
  # Overridden per-deploy: helm upgrade --set image.tag=<git-sha>
  pullPolicy: IfNotPresent
  # IfNotPresent means the node only pulls if that exact tag is not cached.
  # Use Always when you push to the :latest tag so nodes always re-pull.

# ── Service Account ───────────────────────────────────────────────────────────
serviceAccount:
  name: gitflow-analyzer
  annotations: {}
  # When running on EKS, add the IRSA role ARN here:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::153772056450:role/gitflow-analyzer-dev-app-role
  # This tells EKS to inject temporary AWS credentials into pods using this
  # service account, replacing the need for node-level IAM permissions.
  # Leave empty for now — it has no effect until you are on EKS.

# ── Analyzer ──────────────────────────────────────────────────────────────────
analyzer:
  replicaCount: 1
  image:
    repository: 153772056450.dkr.ecr.eu-west-1.amazonaws.com/gitflow-analyzer/analyzer
  port: 5001
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
    # analyzer clones full repos and walks directory trees — it is CPU and
    # memory heavy compared to the other two services.
    # CPU request is 250m so HPA triggers at a realistic load point (175m actual).
    # 1Gi memory limit protects against OOMKill on large repos.
  env:
    PROJECT_NAME: gitflow-analyzer
    ENVIRONMENT: dev
    AWS_REGION: eu-west-1
    PORT: "5001"
    GIT_PYTHON_REFRESH: quiet
    # GIT_PYTHON_REFRESH=quiet suppresses GitPython's warning about missing
    # git configuration, which pollutes logs in a container environment.

# ── Graph Builder ─────────────────────────────────────────────────────────────
graphBuilder:
  replicaCount: 1
  image:
    repository: 153772056450.dkr.ecr.eu-west-1.amazonaws.com/gitflow-analyzer/graph-builder
  port: 5002
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    PROJECT_NAME: gitflow-analyzer
    ENVIRONMENT: dev
    AWS_REGION: eu-west-1
    PORT: "5002"
    GIT_PYTHON_REFRESH: quiet

# ── Result API ────────────────────────────────────────────────────────────────
resultApi:
  replicaCount: 1
  image:
    repository: 153772056450.dkr.ecr.eu-west-1.amazonaws.com/gitflow-analyzer/result-api
  port: 5000
  service:
    type: ClusterIP
    # ClusterIP: only reachable inside the cluster via the Ingress.
    # The frontend nginx proxies /api/* to this service internally.
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
    # result-api is a thin orchestrator — it only calls the other two services
    # and merges the responses. Very low resource footprint.
  env:
    ANALYZER_URL: "http://analyzer:5001"
    GRAPH_BUILDER_URL: "http://graph-builder:5002"
    PORT: "5000"
    # These URLs work because Kubernetes creates a DNS entry for every Service.
    # When result-api calls http://analyzer:5001, CoreDNS resolves "analyzer"
    # to the ClusterIP of the analyzer Service automatically.

  database:
    host: ""
    port: "5432"
    name: "gitflow"
    user: "gitflow"
    # host is set per-environment in values-dev.yaml / values-production.yaml.
    # The password is never stored here — the app fetches it from Secrets Manager
    # at startup using the same boto3 pattern as the GitHub token.


# ── Monitoring ────────────────────────────────────────────────────────────────
monitoring:
  enabled: true
  # Set to false if kube-prometheus-stack is not installed in the cluster.
  # When true, a ServiceMonitor is created so Prometheus scrapes /metrics on
  # all three services every 30 seconds.

# ── HPA ───────────────────────────────────────────────────────────────────────
hpa:
  enabled: false
  # Requires the Kubernetes Metrics Server to be installed in the cluster.
  # Metrics Server is deployed via terraform/modules/monitoring/main.tf.

  # CPU threshold at which a new pod is added (applies to all three services).
  targetCPUUtilizationPercentage: 70

  # Per-service replica limits — each service scales independently.
  # analyzer gets the highest max because it does the heaviest work:
  # cloning repos and running pygments over every file in the tree.
  analyzer:
    minReplicas: 1
    maxReplicas: 5
  graphBuilder:
    minReplicas: 1
    maxReplicas: 3
  resultApi:
    minReplicas: 1
    maxReplicas: 3

# ── Network Policy ────────────────────────────────────────────────────────────
networkPolicy:
  enabled: false
  # When enabled, each service only accepts ingress from the allowed sources:
  #   analyzer      ← result-api pods, monitoring namespace (Prometheus)
  #   graph-builder ← result-api pods, monitoring namespace (Prometheus)
  #   result-api    ← the VPC CIDR (ALB targets are always VPC IPs)
  # All other ingress is implicitly denied by the policy itself.
  vpcCidr: "10.0.0.0/16"
  # All three environments (dev/staging/production) share the same VPC
  # (one EKS cluster, three namespaces) — see terraform/modules/vpc — so
  # this doesn't need a per-environment override.

# ── PDB ───────────────────────────────────────────────────────────────────────
pdb:
  enabled: false
  # minAvailable: 1 keeps at least one pod running during voluntary disruptions.
  # If only 1 replica exists, a node drain will be blocked until HPA scales up
  # a second pod — intentional behaviour that prevents silent downtime.
  analyzer:
    minAvailable: 1
  graphBuilder:
    minAvailable: 1
  resultApi:
    minAvailable: 1

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: alb
  # alb = AWS Load Balancer Controller, which must be installed in the cluster.
  # The controller watches for Ingress resources and creates an ALB automatically.
  host: ""
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: gitflow-analyzer
    alb.ingress.kubernetes.io/group.order: "20"
    # group.name joins this Ingress into a shared ALB with the Grafana Ingress.
    # group.order 20 means /api/* rules are evaluated after Grafana's /dashboard
    # rules (order 10) — lower number = higher priority.
  # Disabled by default — enable after the AWS Load Balancer Controller is
  # installed in the cluster (that is Week 4 work).
