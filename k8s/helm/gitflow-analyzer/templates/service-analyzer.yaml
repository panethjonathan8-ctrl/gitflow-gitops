apiVersion: v1
kind: Service
metadata:
  name: analyzer
  labels:
    app.kubernetes.io/name: analyzer
    {{- include "gitflow-analyzer.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: analyzer
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.analyzer.port }}
      targetPort: {{ .Values.analyzer.port }}
