apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-builder
  labels:
    app.kubernetes.io/name: graph-builder
    {{- include "gitflow-analyzer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.graphBuilder.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: graph-builder
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graph-builder
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "gitflow-analyzer.serviceAccountName" . }}
      terminationGracePeriodSeconds: 90
      # 5s preStop sleep + up to 60s for in-flight graph building + buffer.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: graph-builder
          image: "{{ .Values.graphBuilder.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          ports:
            - name: http
              containerPort: {{ .Values.graphBuilder.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gitflow-analyzer.fullname" . }}-graph-builder
          resources:
            {{- toYaml .Values.graphBuilder.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.graphBuilder.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.graphBuilder.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
