apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-api
  labels:
    app.kubernetes.io/name: result-api
    {{- include "gitflow-analyzer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.resultApi.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: result-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: result-api
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "gitflow-analyzer.serviceAccountName" . }}
      terminationGracePeriodSeconds: 45
      # 5s preStop sleep + up to 30s for in-flight proxied requests + buffer.
      # result-api only proxies to other services so 45s is sufficient.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: result-api
          image: "{{ .Values.resultApi.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          ports:
            - name: http
              containerPort: {{ .Values.resultApi.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gitflow-analyzer.fullname" . }}-result-api
          resources:
            {{- toYaml .Values.resultApi.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.resultApi.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.resultApi.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
