apiVersion: v1
kind: Service
metadata:
  name: result-api
  labels:
    app.kubernetes.io/name: result-api
    {{- include "gitflow-analyzer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.resultApi.service.type }}
  # Default: ClusterIP — only reachable inside the cluster, used with an Ingress.
  # Change to LoadBalancer in values to get a public IP for quick smoke testing
  # before the ingress controller is set up.
  selector:
    app.kubernetes.io/name: result-api
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.resultApi.port }}
      targetPort: {{ .Values.resultApi.port }}
