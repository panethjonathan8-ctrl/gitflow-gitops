{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gitflow-analyzer.fullname" . }}
  labels:
    {{- include "gitflow-analyzer.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: result-api
                port:
                  number: {{ .Values.resultApi.port }}
                # CloudFront routes /* to S3 (static files) and /api/* to
                # this ALB (result-api). The ALB only needs to serve the API.
      {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host }}
      {{- end }}
{{- end }}
