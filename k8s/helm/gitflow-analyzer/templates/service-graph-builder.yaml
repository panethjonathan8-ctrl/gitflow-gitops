apiVersion: v1
kind: Service
metadata:
  name: graph-builder
  labels:
    app.kubernetes.io/name: graph-builder
    {{- include "gitflow-analyzer.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: graph-builder
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.graphBuilder.port }}
      targetPort: {{ .Values.graphBuilder.port }}
