apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyzer
  labels:
    app.kubernetes.io/name: analyzer
    {{- include "gitflow-analyzer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.analyzer.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: analyzer
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: analyzer
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "gitflow-analyzer.serviceAccountName" . }}
      terminationGracePeriodSeconds: 90
      # 5s preStop sleep + up to 60s for in-flight analysis + buffer.
      # Kubernetes sends SIGKILL after this — anything still running is force-killed.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: analyzer
          image: "{{ .Values.analyzer.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
                # Delays SIGTERM by 5 seconds so the ALB has time to deregister
                # this pod and stop routing new requests before Gunicorn shuts down.
                # Without this, requests arriving in the deregistration window get
                # connection refused errors.
          ports:
            - name: http
              containerPort: {{ .Values.analyzer.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gitflow-analyzer.fullname" . }}-analyzer
          resources:
            {{- toYaml .Values.analyzer.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.analyzer.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.analyzer.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
