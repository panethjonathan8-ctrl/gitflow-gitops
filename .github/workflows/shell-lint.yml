name: Shell Lint

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/**"
      - "**/*.sh"
  # Runs when any shell script changes anywhere in the repo.
  # The **/*.sh glob catches scripts nested inside modules (e.g. user_data.sh).

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
        # shellcheck is available in the Ubuntu apt repository.
        # Pinning via apt gives us the distro-stable version which is
        # conservative but consistent across runs.

      - name: Run ShellCheck on all shell scripts
        run: |
          find . -name "*.sh" \
            -not -path "./.git/*" \
            | sort | while read -r file; do
            echo "Checking $file"
            shellcheck --severity=warning "$file"
          done
        # --severity=warning catches real problems (unquoted variables, missing
        # set -e, command injection risks) while ignoring stylistic suggestions
        # that would be noise. Raise to --severity=error if you only want
        # hard failures.
        #
        # The find+while loop checks every .sh file in the repo rather than
        # listing them manually — new scripts are automatically covered.
