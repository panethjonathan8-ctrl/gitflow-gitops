name: release-please

on:
  push:
    branches:
      - main

# release-please needs write access to create the Release PR and the git tag.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Turns on GitHub's native auto-merge for the release PR instead of
      # merging it immediately — it still waits for any required checks or
      # reviews configured on the branch, it just removes the manual click.
      # `pr` is a JSON string of the PullRequest object (root-package output,
      # since this repo's release-please-config.json has a single "." path).
      # Parsing happens in the run: script, not via fromJSON() in an env:
      # expression — GitHub Actions evaluates env: expressions before
      # checking if:, so fromJSON() on the empty string this step gets on a
      # run with no releasable commits would fail the whole step even though
      # if: was about to skip it.
      # --repo is required: this job never runs actions/checkout, so there's
      # no local .git directory for gh to detect the target repository from
      # — without it, gh pr merge fails with "not a git repository".
      # GITHUB_REPOSITORY ("owner/repo") is a default env var GitHub Actions
      # provides on every step, no need to set it explicitly.
      - name: Enable auto-merge on the release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: gh pr merge --repo "$GITHUB_REPOSITORY" --squash --auto "$(echo "$RELEASE_PR" | jq -r .number)"
